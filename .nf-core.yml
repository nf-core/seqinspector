lint:
  files_exist:
    - tests/default.nf.test
  files_unchanged:
    - .github/CONTRIBUTING.md
    - assets/nf-core-seqinspector_logo_light.png
    - docs/images/nf-core-seqinspector_logo_dark.png
    - docs/images/nf-core-seqinspector_logo_light.png
  multiqc_config: false
  nextflow_config:
    - config_defaults:
        - params.fastq_screen_references
  nf_test_content: false
nf_core_version: 4.0.1
repository_type: pipeline
template:
  author: Adrien Coulier
  description: Pipeline to QC your sequences
  force: false
  is_nfcore: true
  name: seqinspector
  org: nf-core
  outdir: .
  version: 1.1.0dev
